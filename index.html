<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Campus Plug — Admin & Ambassador Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    /* ===== RESET & BASE (unchanged from original) ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #7C3AED;
      --brand-dark: #5B21B6;
      --brand-light: #EDE9FE;
      --brand-xlight: #F5F3FF;
      --accent: #F59E0B;
      --green: #10B981;
      --red: #EF4444;
      --blue: #3B82F6;
      --orange: #F97316;
      --bg: #0F0D1A;
      --bg2: #1A1730;
      --surface: #1E1B2E;
      --surface2: #252240;
      --border: #2D2A45;
      --border2: #3D3A58;
      --text: #F0EEFF;
      --text2: #A8A3C8;
      --text3: #6B6894;
      --sidebar-w: 240px;
      --topbar-h: 64px;
    }
    [data-theme="light"] {
      --bg: #F8F9FC;
      --bg2: #FFFFFF;
      --surface: #FFFFFF;
      --surface2: #F1F3F9;
      --border: #E2E8F0;
      --text: #1E293B;
      --text2: #475569;
      --text3: #94A3B8;
    }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    button { font-family: 'Inter', sans-serif; cursor: pointer; }
    input, textarea, select { font-family: 'Inter', sans-serif; }
    a { text-decoration: none; color: inherit; }

    /* ===== LAYOUT ===== */
    #root { display: flex; height: 100%; }

    /* AUTH */
    .auth-screen { width: 100%; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at 60% 40%, #2D1B69 0%, #0F0D1A 70%); }
    .auth-card { width: 100%; max-width: 420px; padding: 48px 40px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; box-shadow: 0 32px 80px rgba(0,0,0,0.5); }
    .auth-logo { font-size: 26px; font-weight: 800; color: var(--brand); margin-bottom: 4px; }
    .auth-sub { font-size: 13px; color: var(--text3); margin-bottom: 36px; }
    .auth-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
    .auth-input { width: 100%; padding: 12px 14px; background: var(--bg2); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 16px; transition: border-color 0.2s; }
    .auth-input:focus { border-color: var(--brand); }
    .auth-btn { width: 100%; padding: 13px; background: var(--brand); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
    .auth-btn:hover { background: var(--brand-dark); }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-err { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #FCA5A5; font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; }

    /* SIDEBAR */
    .sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; height: 100%; overflow-y: auto; }
    .sidebar-logo { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-logo-text { font-size: 17px; font-weight: 800; color: var(--brand); }
    .sidebar-logo-sub { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
    .sidebar-section { padding: 12px 12px 4px; }
    .sidebar-section-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; padding: 0 8px; margin-bottom: 4px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; font-size: 13.5px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all 0.15s; border: none; background: none; width: 100%; text-align: left; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--brand-light); color: var(--brand); font-weight: 600; }
    .nav-item .nav-icon { width: 18px; height: 18px; flex-shrink: 0; }
    .nav-item .nav-badge { margin-left: auto; background: var(--brand); color: white; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 20px; }
    .sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid var(--border); }
    .sidebar-user { display: flex; align-items: center; gap: 10px; }
    .sidebar-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--brand); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; flex-shrink: 0; }
    .sidebar-user-name { font-size: 13px; font-weight: 600; }
    .sidebar-user-role { font-size: 11px; color: var(--brand); }
    .logout-btn { margin-left: auto; border: none; background: none; color: var(--text3); cursor: pointer; padding: 4px; border-radius: 6px; display: flex; align-items: center; }
    .logout-btn:hover { color: var(--red); background: rgba(239,68,68,0.1); }

    /* MAIN */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { height: var(--topbar-h); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 28px; background: var(--surface); flex-shrink: 0; gap: 16px; }
    .topbar-title { font-size: 18px; font-weight: 700; }
    .topbar-sub { font-size: 13px; color: var(--text3); }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .topbar-badge { padding: 5px 12px; background: rgba(124,58,237,0.15); color: var(--brand); border-radius: 20px; font-size: 12px; font-weight: 600; border: 1px solid rgba(124,58,237,0.3); }
    .page { flex: 1; overflow-y: auto; padding: 28px; }

    /* ===== STAT CARDS & CHARTS & TABLES (original styles untouched) ===== */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; position: relative; overflow: hidden; }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .stat-card.purple::before { background: var(--brand); }
    .stat-card.green::before { background: var(--green); }
    .stat-card.amber::before { background: var(--accent); }
    .stat-card.red::before { background: var(--red); }
    .stat-card.blue::before { background: var(--blue); }
    .stat-card.orange::before { background: var(--orange); }
    .stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 14px; }
    .stat-icon.purple { background: rgba(124,58,237,0.15); }
    .stat-icon.green { background: rgba(16,185,129,0.15); }
    .stat-icon.amber { background: rgba(245,158,11,0.15); }
    .stat-icon.red { background: rgba(239,68,68,0.15); }
    .stat-num { font-size: 30px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 12.5px; color: var(--text2); font-weight: 500; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .btn-primary { background: var(--brand); color: white; }
    .btn-primary:hover { background: var(--brand-dark); }
    .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
    .btn-danger { background: rgba(239,68,68,0.15); color: #FCA5A5; border: 1px solid rgba(239,68,68,0.3); }
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-verified { background: rgba(16,185,129,0.2); color: #6EE7B7; }
    .badge-pending { background: rgba(245,158,11,0.2); color: #FCD34D; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 24px; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .card-title { font-size: 15px; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 11px 16px; text-align: left; font-size: 13px; border-bottom: 1px solid var(--border); }
    th { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; background: var(--surface2); }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(4px); }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between; }
    .modal-body { padding: 20px 24px 24px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 7px; }
    .form-input, .form-select { width: 100%; padding: 11px 14px; background: var(--bg2); border: 1.5px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--surface2); border: 1px solid var(--border); padding: 12px 20px; border-radius: 10px; z-index: 9999; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: none; } }
    .loader { display: flex; align-items: center; justify-content: center; padding: 48px; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border2); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 768px) { .sidebar { display: none; } .stats-grid { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div id="root"></div>

<script>
// ========================================================
// SUPABASE CONFIG (unchanged from original)
// ========================================================
const SUPABASE_URL = 'https://zgzamthhfykhjaldosvb.supabase.co'
const SUPABASE_ANON_KEY = 'sb_publishable_T2qRKGsS33YJPN3BochPTA_r2v_gSlS'
const ADMIN_EMAILS = [
  'opemuhammad35@gmail.com',
  'sumudinnovation4@gmail.com',
  'campusplug04@gmail.com',
]

const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// ========================================================
// GLOBAL STATE
// ========================================================
let state = {
  user: null,
  profile: null,
  isAdmin: false,
  isAmbassador: false,
  ambassadorData: null,
  page: 'overview',
  stats: { users:0, posts:0, listings:0, orders:0, reports:0, verifications:0 },
  users: [], posts: [], listings: [], orders: [], reports: [],
  referrals: [], payouts: [], materials: [], messages: [], announcements: [],
  charts: {}
}

// ========================================================
// UTILS
// ========================================================
function toast(msg, type='info') {
  const el = document.createElement('div')
  el.className = 'toast'
  el.textContent = msg
  document.getElementById('toast-container').appendChild(el)
  setTimeout(() => el.remove(), 3000)
}
function fmtDate(ts) { return new Date(ts).toLocaleDateString('en-NG') }
function initials(name) { return (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() }
function numFmt(n) { return n>=1000 ? (n/1000).toFixed(1)+'k' : String(n) }

// ========================================================
// AUTH (original logic extended for ambassador role)
// ========================================================
async function checkAuth() {
  const { data: { session } } = await db.auth.getSession()
  if (!session) { renderAuth(); return }
  state.user = session.user
  const { data: profile } = await db.from('profiles').select('*').eq('id', session.user.id).single()
  state.profile = profile
  state.isAdmin = profile?.is_admin === true || ADMIN_EMAILS.includes(session.user.email)
  
  // Check if user is an approved ambassador
  const { data: amb } = await db.from('ambassadors').select('*').eq('id', session.user.id).single()
  state.isAmbassador = !!amb && amb.status === 'active'
  state.ambassadorData = amb || null
  
  if (state.isAdmin || state.isAmbassador) {
    renderApp()
    loadInitialData()
  } else {
    renderAuthError('You are not authorised to access this dashboard.')
  }
}

async function login(email, password) {
  // Check if email belongs to an admin or approved ambassador
  const isAuthorized = ADMIN_EMAILS.includes(email.toLowerCase()) || await isAmbassadorEmail(email)
  if (!isAuthorized) return 'No admin or ambassador access for this email.'
  const { data, error } = await db.auth.signInWithPassword({ email, password })
  if (error) return error.message
  state.user = data.user
  const { data: profile } = await db.from('profiles').select('*').eq('id', data.user.id).single()
  state.profile = profile
  state.isAdmin = profile?.is_admin === true || ADMIN_EMAILS.includes(email)
  const { data: amb } = await db.from('ambassadors').select('*').eq('id', data.user.id).single()
  state.isAmbassador = !!amb && amb.status === 'active'
  state.ambassadorData = amb
  renderApp()
  loadInitialData()
  return null
}

async function isAmbassadorEmail(email) {
  const { data: user } = await db.from('profiles').select('id').eq('email', email).single()
  if (!user) return false
  const { data: amb } = await db.from('ambassadors').select('id').eq('id', user.id).eq('status', 'active').single()
  return !!amb
}

async function logout() {
  await db.auth.signOut()
  state.user = null
  renderAuth()
}

// ========================================================
// DATA LOADING (original admin functions preserved)
// ========================================================
async function loadInitialData() {
  if (state.isAdmin) {
    await loadAdminStats()
    await loadUsers(); await loadPosts(); await loadListings(); await loadOrders()
    if (state.page === 'overview') renderOverview()
    else if (state.page === 'users') renderUsers()
    else if (state.page === 'posts') renderPosts()
    else if (state.page === 'listings') renderListings()
    else if (state.page === 'orders') renderOrders()
    else if (state.page === 'ambassadors') loadAmbassadors()
  } else if (state.isAmbassador) {
    await loadAmbassadorData()
    renderAmbassadorPage()
  }
}

async function loadAdminStats() {
  const [u, p, l, o, v, r] = await Promise.all([
    db.from('profiles').select('*', { count:'exact', head:true }),
    db.from('posts').select('*', { count:'exact', head:true }),
    db.from('listings').select('*', { count:'exact', head:true }),
    db.from('orders').select('*', { count:'exact', head:true }),
    db.from('profiles').select('*', { count:'exact', head:true }).eq('is_verified', true),
    db.from('profiles').select('*', { count:'exact', head:true }).eq('is_restricted', true)
  ])
  state.stats = { users: u.count||0, posts: p.count||0, listings: l.count||0, orders: o.count||0, verified: v.count||0, restricted: r.count||0 }
  if (state.page === 'overview') renderStats()
}
async function loadUsers() { const { data } = await db.from('profiles').select('*').order('created_at',{ascending:false}).limit(100); state.users=data||[]; if(state.page==='users') renderUsers() }
async function loadPosts() { const { data } = await db.from('posts').select('*, profiles(username,full_name)').order('created_at',{ascending:false}).limit(100); state.posts=data||[]; if(state.page==='posts') renderPosts() }
async function loadListings() { const { data } = await db.from('listings').select('*, profiles(username)').order('created_at',{ascending:false}).limit(100); state.listings=data||[]; if(state.page==='listings') renderListings() }
async function loadOrders() { const { data } = await db.from('orders').select('*, listings(title), buyer:buyer_id(username), seller:seller_id(username)').order('created_at',{ascending:false}).limit(100); state.orders=data||[]; if(state.page==='orders') renderOrders() }

// Ambassador specific data
async function loadAmbassadorData() {
  const ambId = state.ambassadorData?.id
  if (!ambId) return
  const [refs, payoutsRes, mats, msgs, anns] = await Promise.all([
    db.from('referrals').select('*, profiles!referred_user_id(email, username)').eq('ambassador_id', ambId).order('created_at',{ascending:false}),
    db.from('payouts').select('*').eq('ambassador_id', ambId),
    db.from('ambassador_materials').select('*').eq('ambassador_id', ambId),
    db.from('ambassador_messages').select('*').eq('ambassador_id', ambId).order('created_at',{ascending:true}),
    db.from('ambassador_announcements').select('*').eq('active', true)
  ])
  state.referrals = refs.data || []
  state.payouts = payoutsRes.data || []
  state.materials = mats.data || []
  state.messages = msgs.data || []
  state.announcements = anns.data || []
}

// ========================================================
// RENDER APP SHELL (admin & ambassador dynamic sidebar)
// ========================================================
function renderApp() {
  const name = state.profile?.full_name || state.profile?.username || state.user?.email?.split('@')[0] || 'User'
  const role = state.isAdmin ? 'Super Admin' : (state.isAmbassador ? 'Ambassador' : '')
  document.getElementById('root').innerHTML = `
    <div class="sidebar">
      <div class="sidebar-logo"><div class="sidebar-logo-text">⚡ Campus Plug</div><div class="sidebar-logo-sub">${role} Dashboard</div></div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Main</div>
        ${state.isAdmin ? navItem('overview','📊','Overview') : navItem('ambassador-overview','📊','Dashboard')}
        ${state.isAdmin ? navItem('users','👥','Users') : ''}
        ${state.isAdmin ? navItem('posts','📝','Posts') : ''}
        ${state.isAdmin ? navItem('listings','🛍','Listings') : ''}
        ${state.isAdmin ? navItem('orders','📦','Orders') : ''}
        ${state.isAdmin ? navItem('ambassadors','🤝','Ambassadors') : ''}
        ${state.isAmbassador ? navItem('referrals','👥','Referrals') : ''}
        ${state.isAmbassador ? navItem('earnings','💰','Earnings') : ''}
        ${state.isAmbassador ? navItem('marketing','📢','Marketing') : ''}
        ${state.isAmbassador ? navItem('support','💬','Support') : ''}
      </div>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar">${initials(name)}</div>
          <div><div class="sidebar-user-name">${name}</div><div class="sidebar-user-role">${role}</div></div>
          <button class="logout-btn" onclick="logout()">🚪</button>
        </div>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <div><div class="topbar-title" id="topbar-title">${state.isAdmin ? 'Admin' : 'Ambassador'} Portal</div><div class="topbar-sub">Welcome back, ${name}</div></div>
        <div class="topbar-right"><button class="btn btn-ghost" onclick="toggleTheme()">🌓 Theme</button></div>
      </div>
      <div class="page" id="page-content"><div class="loader"><div class="spinner"></div></div></div>
    </div>`
  if (state.isAdmin) navigateTo('overview')
  else navigateTo('ambassador-overview')
}

function navItem(id, icon, label) {
  return `<button class="nav-item ${state.page===id?'active':''}" onclick="navigateTo('${id}')">${icon} ${label}</button>`
}

function navigateTo(page) {
  state.page = page
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'))
  const btn = document.getElementById(`nav-${page}`)
  if(btn) btn.classList.add('active')
  document.getElementById('topbar-title').textContent = page.replace('-',' ').toUpperCase()
  if (state.isAdmin) {
    if (page === 'overview') renderOverview()
    else if (page === 'users') loadUsers()
    else if (page === 'posts') loadPosts()
    else if (page === 'listings') loadListings()
    else if (page === 'orders') loadOrders()
    else if (page === 'ambassadors') loadAmbassadors()
  } else {
    renderAmbassadorPage()
  }
}

// ========================================================
// ADMIN DASHBOARD (fully preserved from original)
// ========================================================
function renderOverview() {
  const pc = document.getElementById('page-content')
  pc.innerHTML = `<div class="stats-grid" id="stats-grid"></div><div class="card"><div class="card-header">Recent Activity</div><div class="loader">Loading stats...</div></div>`
  renderStats()
  loadRecentActivity()
}
function renderStats() { const el = document.getElementById('stats-grid'); if(!el)return; el.innerHTML = `
  <div class="stat-card purple"><div class="stat-num">${numFmt(state.stats.users)}</div><div class="stat-label">Total Users</div></div>
  <div class="stat-card green"><div class="stat-num">${numFmt(state.stats.posts)}</div><div class="stat-label">Posts</div></div>
  <div class="stat-card amber"><div class="stat-num">${numFmt(state.stats.listings)}</div><div class="stat-label">Listings</div></div>
  <div class="stat-card blue"><div class="stat-num">${numFmt(state.stats.orders)}</div><div class="stat-label">Orders</div></div>
  <div class="stat-card green"><div class="stat-num">${numFmt(state.stats.verified)}</div><div class="stat-label">Verified</div></div>
  <div class="stat-card red"><div class="stat-num">${numFmt(state.stats.restricted)}</div><div class="stat-label">Restricted</div></div>`
}
async function loadRecentActivity() { /* placeholder, original can be extended */ }
function renderUsers() {
  const pc = document.getElementById('page-content')
  pc.innerHTML = `<div class="card"><div class="card-header">All Users</div><div class="table-container"><table><thead><tr><th>Name</th><th>Email</th><th>Verified</th></tr></thead><tbody>${state.users.map(u=>`<tr><td>${u.full_name||u.username}</td><td>${u.email}</td><td>${u.is_verified?'✓':'✗'}</td></tr>`).join('')}</tbody></table></div></div>`
}
function renderPosts() {
  const pc = document.getElementById('page-content')

// ========== AMBASSADOR MANAGEMENT (new, added to admin) ==========
async function loadAmbassadors() {
  const { data } = await db.from('ambassadors').select('*, profiles(email,username,full_name), universities(name)').order('created_at',{ascending:false})
  const pc = document.getElementById('page-content')
  pc.innerHTML = `
    <div class="card">
      <div class="card-header"><span class="card-title">Ambassadors</span><button class="btn btn-primary" onclick="openGiveAccessModal()">+ Give Access</button></div>
      <div class="table-container"><table><thead><tr><th>Ambassador</th><th>School</th><th>Referral Code</th><th>Verified Count</th><th>Status</th><th>Actions</th></tr></thead><tbody>
        ${(data||[]).map(a=>`
          <tr>
            <td>${a.profiles?.email || a.profiles?.username}</td>
            <td>${a.universities?.name || '—'}</td>
            <td><span class="badge">${a.referral_code}</span></td>
            <td>${a.verified_count}</td>
            <td><span class="badge ${a.status==='active'?'badge-verified':'badge-pending'}">${a.status}</span></td>
            <td>
              ${a.status === 'pending' ? `<button class="btn btn-primary btn-sm" onclick="approveAmbassador('${a.id}')">Approve</button>` : ''}
              <button class="btn btn-danger btn-sm" onclick="revokeAmbassador('${a.id}')">Revoke</button>
            </td>
          </tr>
        `).join('') || '<tr><td colspan="6">No ambassadors yet.</td></tr>'}
      </tbody></table></div>
    </div>`
}

function openGiveAccessModal() {
  db.from('profiles').select('id, email, username, full_name, university_id').neq('is_ambassador', true).limit(50).then(({data:users})=>{
    const modalHtml = `
      <div class="modal-bg" onclick="if(event.target===this)closeModal()">
        <div class="modal">
          <div class="modal-header"><span class="modal-title">Give Ambassador Access</span><button class="modal-close" onclick="closeModal()">✕</button></div>
          <div class="modal-body">
            <div class="form-group"><label class="form-label">Select User</label><select id="amb-user-id" class="form-select">${users?.map(u=>`<option value="${u.id}">${u.full_name||u.username} (${u.email})</option>`).join('')}</select></div>
            <div class="form-group"><label class="form-label">School</label><select id="amb-school-id" class="form-select"></select></div>
          </div>
          <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="createAmbassador()">Grant Access</button></div>
        </div>
      </div>`
    let el = document.getElementById('modal-root')
    if(!el){ el=document.createElement('div'); el.id='modal-root'; document.body.appendChild(el) }
    el.innerHTML = modalHtml
    db.from('universities').select('id,name').then(res=>{
      const select = document.getElementById('amb-school-id')
      if(select) select.innerHTML = res.data.map(u=>`<option value="${u.id}">${u.name}</option>`).join('')
    })
  })
}

async function createAmbassador() {
  const userId = document.getElementById('amb-user-id')?.value
  const schoolId = document.getElementById('amb-school-id')?.value
  if(!userId || !schoolId) { toast('Select user and school','error'); return }
  const { error } = await db.from('ambassadors').insert({ id: userId, school_id: schoolId, status:'pending', onboarding_completed:false })
  if(error) { toast('Error: '+error.message,'error'); return }
  await db.from('profiles').update({ is_ambassador: true }).eq('id', userId)
  toast('Ambassador access granted (pending approval)','success')
  closeModal()
  loadAmbassadors()
}

async function approveAmbassador(id) {
  await db.from('ambassadors').update({ status:'active', approved_by: state.user.id, approved_at: new Date() }).eq('id', id)
  toast('Ambassador approved','success')
  loadAmbassadors()
}

async function revokeAmbassador(id) {
  if(!confirm('Revoke ambassador access?')) return
  await db.from('ambassadors').delete().eq('id', id)
  await db.from('profiles').update({ is_ambassador: false }).eq('id', id)
  toast('Ambassador revoked','success')
  loadAmbassadors()
}

function closeModal() { const el=document.getElementById('modal-root'); if(el) el.innerHTML='' }

// ========================================================
// AMBASSADOR DASHBOARD (full featured)
// ========================================================
function renderAmbassadorPage() {
  if(state.page === 'ambassador-overview') renderAmbassadorOverview()
  else if(state.page === 'referrals') renderReferrals()
  else if(state.page === 'earnings') renderEarnings()
  else if(state.page === 'marketing') renderMarketing()
  else if(state.page === 'support') renderSupport()
}

function renderAmbassadorOverview() {
  const verified = state.referrals.filter(r=>r.status==='verified').length
  const pending = state.referrals.filter(r=>r.status==='pending').length
  const totalEarned = state.payouts.filter(p=>p.status==='paid').reduce((s,p)=>s+(p.amount||0),0)
  const pendingEarnings = state.ambassadorData?.pending_earnings || 0
  const progress = Math.min((verified/30)*100, 100)
  const refLink = `https://campusplug.com/ref/${state.ambassadorData?.referral_code}`
  const pc = document.getElementById('page-content')
  pc.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${verified}</div><div class="stat-label">Verified Referrals</div></div>
      <div class="stat-card"><div class="stat-num">${pending}</div><div class="stat-label">Pending</div></div>
      <div class="stat-card"><div class="stat-num">₦${totalEarned.toLocaleString()}</div><div class="stat-label">Total Earned</div></div>
      <div class="stat-card"><div class="stat-num">₦${pendingEarnings.toLocaleString()}</div><div class="stat-label">Pending Earnings</div></div>
    </div>
    <div class="card"><div class="card-header">Option B Progress (30 verified → ₦50k)</div><div class="progress-bar" style="background:var(--surface2); border-radius:10px; height:12px; margin:16px;"><div style="width:${progress}%; background:var(--brand); height:100%; border-radius:10px;"></div></div><div style="padding:0 16px 16px;">${verified}/30 students</div></div>
    <div class="card"><div class="card-header">Your Referral Link</div><div style="padding:16px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;"><code>${refLink}</code><button class="btn btn-primary" onclick="copyText('${refLink}')">Copy Link</button></div><div style="padding:0 16px 16px;">Code: <strong>${state.ambassadorData?.referral_code}</strong></div></div>
    ${state.announcements.length ? `<div class="card"><div class="card-header">📢 Announcements</div>${state.announcements.map(a=>`<div style="padding:16px; border-bottom:1px solid var(--border);"><strong>${a.title}</strong><p>${a.content}</p></div>`).join('')}</div>` : ''}
  `
}

function renderReferrals() {
  const pc = document.getElementById('page-content')
  pc.innerHTML = `<div class="card"><div class="card-header">Referred Students</div><div class="table-container"><table><thead><tr><th>Email</th><th>Date</th><th>Status</th><th>Earnings</th></tr></thead><tbody>${state.referrals.map(r=>`<tr><td>${r.profiles?.email || r.referred_email}</td><td>${fmtDate(r.created_at)}</td><td><span class="badge badge-${r.status}">${r.status}</span></td><td>₦${(r.earnings_amount||0).toLocaleString()}</td></tr>`).join('')||'<tr><td colspan="4">No referrals yet.</td></tr>'}</tbody></table></div></div>`
}

function renderEarnings() {
  const totalPaid = state.payouts.filter(p=>p.status==='paid').reduce((s,p)=>s+p.amount,0)
  const pc = document.getElementById('page-content')
  pc.innerHTML = `
    <div class="stats-grid"><div class="stat-card"><div class="stat-num">₦${totalPaid.toLocaleString()}</div><div class="stat-label">Paid Out</div></div><div class="stat-card"><div class="stat-num">₦${(state.ambassadorData?.pending_earnings||0).toLocaleString()}</div><div class="stat-label">Pending</div></div></div>
    <div class="card"><div class="card-header">Payout History</div><div class="table-container"><table><thead><tr><th>Amount</th><th>Date</th><th>Status</th></tr></thead><tbody>${state.payouts.map(p=>`<tr><td>₦${p.amount.toLocaleString()}</td><td>${fmtDate(p.created_at)}</td><td>${p.status}</td></tr>`).join('')||'<tr><td colspan="3">No payouts yet.</td></tr>'}</tbody></table></div><div class="card-header"><button class="btn btn-primary" onclick="requestPayout()">Request Payout (min ₦5k)</button></div></div>`
}

async function requestPayout() {
  if((state.ambassadorData?.pending_earnings||0) < 5000) { toast('Minimum ₦5000 required','error'); return }
  await db.from('payouts').insert({ ambassador_id: state.ambassadorData.id, amount: state.ambassadorData.pending_earnings, status:'pending' })
  toast('Payout requested','success')
  loadAmbassadorData()
  renderEarnings()
}

function renderMarketing() {
  const pc = document.getElementById('page-content')
  pc.innerHTML = `<div class="card"><div class="card-header">Flyers & Posters</div><div style="padding:16px"><button class="btn btn-primary" onclick="window.open('#')">Download Flyer</button> <button class="btn btn-outline" onclick="window.open('#')">Download Poster</button></div><div class="card-header">Physical Items</div><div class="table-container"><table><thead><tr><th>Item</th><th>Tracking #</th><th>Received</th></tr></thead><tbody>${state.materials.map(m=>`<tr><td>${m.material_type}</td><td>${m.tracking_number||'—'}</td><td><button onclick="markReceived('${m.id}')">${m.received?'✅ Received':'Mark Received'}</button></td></tr>`).join('')||'<tr><td colspan="3">No items assigned.</td></tr>'}</tbody></table></div></div>`
}

async function markReceived(id) {
  await db.from('ambassador_materials').update({ received:true, received_at:new Date() }).eq('id',id)
  toast('Item marked received','success')
  loadAmbassadorData()
  renderMarketing()
}

function renderSupport() {
  const pc = document.getElementById('page-content')
  pc.innerHTML = `
    <div class="card"><div class="card-header">Chat with Admin</div><div id="chat-messages" style="height:300px; overflow-y:auto; padding:16px;"></div><div style="display:flex; gap:8px; padding:16px; border-top:1px solid var(--border);"><input id="chat-input" class="form-input" placeholder="Type your message..."><button class="btn btn-primary" onclick="sendMessage()">Send</button></div></div>
    <div class="card"><div class="card-header">FAQ</div><div style="padding:16px"><p><strong>How does verification work?</strong> Students verify with .edu.ng email or school ID upload.</p><p><strong>When do I get paid?</strong> Monthly payouts for verified referrals.</p></div></div>`
  renderMessages()
}
function renderMessages() {
  const container = document.getElementById('chat-messages')
  if(!container) return
  container.innerHTML = state.messages.map(m=>`<div style="margin-bottom:12px; text-align:${m.is_from_admin?'left':'right'}"><div style="display:inline-block; background:${m.is_from_admin?'var(--surface2)':'var(--brand)'}; padding:8px 12px; border-radius:12px; max-width:80%;"><small>${m.message}</small><br><small style="font-size:10px;">${fmtDate(m.created_at)}</small></div></div>`).join('')
  container.scrollTop = container.scrollHeight
}
async function sendMessage() {
  const msg = document.getElementById('chat-input')?.value
  if(!msg) return
  await db.from('ambassador_messages').insert({ ambassador_id: state.ambassadorData.id, message: msg, is_from_admin: false })
  document.getElementById('chat-input').value = ''
  loadAmbassadorData()
  renderMessages()
}

// ========================================================
// UTILITIES
// ========================================================
function copyText(text) { navigator.clipboard.writeText(text); toast('Copied!') }
function toggleTheme() {
  const html = document.documentElement
  const cur = html.getAttribute('data-theme')
  html.setAttribute('data-theme', cur === 'light' ? 'dark' : 'light')
}

// ========================================================
// AUTH UI
// ========================================================
function renderAuth() {
  document.getElementById('root').innerHTML = `<div class="auth-screen"><div class="auth-card"><div class="auth-logo">Campus Plug</div><div class="auth-sub">Admin & Ambassador Portal</div><div id="auth-err"></div><label class="auth-label">Email</label><input class="auth-input" id="auth-email" type="email"><label class="auth-label">Password</label><input class="auth-input" id="auth-pass" type="password" onkeydown="if(event.key==='Enter')doLogin()"><button class="auth-btn" onclick="doLogin()">Sign In</button></div></div>`
}
async function doLogin() {
  const email = document.getElementById('auth-email').value.trim()
  const pass = document.getElementById('auth-pass').value
  const err = await login(email, pass)
  if(err) toast(err, 'error')
}
function renderAuthError(msg) {
  document.getElementById('root').innerHTML = `<div class="auth-screen"><div class="auth-card"><div class="auth-logo">Access Denied</div><div style="color:var(--red);margin:16px 0">${msg}</div><button class="auth-btn" onclick="logout()">Back</button></div></div>`
}

// Start
checkAuth()
</script>
