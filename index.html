<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Plug — Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #7C3AED;
      --brand-dark: #5B21B6;
      --brand-light: #EDE9FE;
      --brand-xlight: #F5F3FF;
      --accent: #F59E0B;
      --green: #10B981;
      --red: #EF4444;
      --blue: #3B82F6;
      --orange: #F97316;
      --bg: #0F0D1A;
      --bg2: #1A1730;
      --surface: #1E1B2E;
      --surface2: #252240;
      --border: #2D2A45;
      --border2: #3D3A58;
      --text: #F0EEFF;
      --text2: #A8A3C8;
      --text3: #6B6894;
      --sidebar-w: 240px;
      --topbar-h: 64px;
    }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    button { font-family: 'Inter', sans-serif; cursor: pointer; }
    input, textarea, select { font-family: 'Inter', sans-serif; }
    a { text-decoration: none; color: inherit; }

    /* ===== LAYOUT ===== */
    #root { display: flex; height: 100%; }

    /* AUTH */
    .auth-screen {
      width: 100%; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 60% 40%, #2D1B69 0%, #0F0D1A 70%);
    }
    .auth-card {
      width: 100%; max-width: 420px; padding: 48px 40px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }
    .auth-logo { font-size: 26px; font-weight: 800; color: var(--brand); margin-bottom: 4px; }
    .auth-sub { font-size: 13px; color: var(--text3); margin-bottom: 36px; }
    .auth-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
    .auth-input {
      width: 100%; padding: 12px 14px; background: var(--bg2);
      border: 1.5px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 14px; outline: none; margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--brand); }
    .auth-btn {
      width: 100%; padding: 13px; background: var(--brand); color: white;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.2s; margin-top: 4px;
    }
    .auth-btn:hover { background: var(--brand-dark); }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-err { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #FCA5A5; font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; }

    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0; height: 100%; overflow-y: auto;
    }
    .sidebar-logo {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo-text { font-size: 17px; font-weight: 800; color: var(--brand); }
    .sidebar-logo-sub { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

    .sidebar-section { padding: 12px 12px 4px; }
    .sidebar-section-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; padding: 0 8px; margin-bottom: 4px; }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 8px; font-size: 13.5px; font-weight: 500;
      color: var(--text2); cursor: pointer; transition: all 0.15s; border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--brand-light); color: var(--brand); font-weight: 600; }
    .nav-item .nav-icon { width: 18px; height: 18px; flex-shrink: 0; }
    .nav-item .nav-badge {
      margin-left: auto; background: var(--brand); color: white;
      font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 20px;
    }

    .sidebar-footer {
      margin-top: auto; padding: 16px; border-top: 1px solid var(--border);
    }
    .sidebar-user { display: flex; align-items: center; gap: 10px; }
    .sidebar-avatar {
      width: 34px; height: 34px; border-radius: 50%; background: var(--brand);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: white; flex-shrink: 0;
    }
    .sidebar-user-name { font-size: 13px; font-weight: 600; }
    .sidebar-user-role { font-size: 11px; color: var(--brand); }
    .logout-btn {
      margin-left: auto; border: none; background: none; color: var(--text3);
      cursor: pointer; padding: 4px; border-radius: 6px; display: flex; align-items: center;
    }
    .logout-btn:hover { color: var(--red); background: rgba(239,68,68,0.1); }

    /* MAIN */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar {
      height: var(--topbar-h); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 28px;
      background: var(--surface); flex-shrink: 0; gap: 16px;
    }
    .topbar-title { font-size: 18px; font-weight: 700; }
    .topbar-sub { font-size: 13px; color: var(--text3); }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .topbar-badge {
      padding: 5px 12px; background: rgba(124,58,237,0.15); color: var(--brand);
      border-radius: 20px; font-size: 12px; font-weight: 600; border: 1px solid rgba(124,58,237,0.3);
    }

    .page { flex: 1; overflow-y: auto; padding: 28px; }

    /* ===== STAT CARDS ===== */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 22px; position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .stat-card.purple::before { background: var(--brand); }
    .stat-card.green::before { background: var(--green); }
    .stat-card.amber::before { background: var(--accent); }
    .stat-card.red::before { background: var(--red); }
    .stat-card.blue::before { background: var(--blue); }
    .stat-card.orange::before { background: var(--orange); }

    .stat-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; margin-bottom: 14px;
    }
    .stat-icon.purple { background: rgba(124,58,237,0.15); }
    .stat-icon.green { background: rgba(16,185,129,0.15); }
    .stat-icon.amber { background: rgba(245,158,11,0.15); }
    .stat-icon.red { background: rgba(239,68,68,0.15); }
    .stat-icon.blue { background: rgba(59,130,246,0.15); }
    .stat-icon.orange { background: rgba(249,115,22,0.15); }

    .stat-num { font-size: 30px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 12.5px; color: var(--text2); font-weight: 500; }
    .stat-delta { font-size: 11px; margin-top: 6px; }
    .stat-delta.up { color: var(--green); }
    .stat-delta.down { color: var(--red); }

    /* ===== CHARTS ===== */
    .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 24px; }
    .chart-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 22px;
    }
    .chart-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .chart-sub { font-size: 12px; color: var(--text3); margin-bottom: 20px; }
    .chart-wrap { position: relative; height: 220px; }

    /* ===== TABLE ===== */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
    }
    .card-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .card-title { font-size: 15px; font-weight: 700; }
    .card-count { font-size: 12px; color: var(--text3); background: var(--surface2); padding: 3px 10px; border-radius: 20px; }
    .card-actions { margin-left: auto; display: flex; gap: 8px; }

    .search-box {
      padding: 8px 14px; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 13px; outline: none; width: 220px;
    }
    .search-box:focus { border-color: var(--brand); }
    .search-box::placeholder { color: var(--text3); }

    .filter-select {
      padding: 8px 12px; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 13px; outline: none; cursor: pointer;
    }

    table { width: 100%; border-collapse: collapse; }
    th {
      padding: 11px 16px; text-align: left; font-size: 11px; font-weight: 700;
      color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border); background: var(--surface2);
    }
    td {
      padding: 13px 16px; font-size: 13.5px; border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .user-cell { display: flex; align-items: center; gap: 10px; }
    .user-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: white;
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
    }
    .user-name { font-weight: 600; font-size: 13.5px; }
    .user-handle { font-size: 11px; color: var(--text3); }

    /* BADGES */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .badge-admin { background: rgba(124,58,237,0.2); color: #C4B5FD; border: 1px solid rgba(124,58,237,0.3); }
    .badge-verified { background: rgba(59,130,246,0.2); color: #93C5FD; border: 1px solid rgba(59,130,246,0.3); }
    .badge-restricted { background: rgba(245,158,11,0.2); color: #FCD34D; border: 1px solid rgba(245,158,11,0.3); }
    .badge-banned { background: rgba(239,68,68,0.2); color: #FCA5A5; border: 1px solid rgba(239,68,68,0.3); }
    .badge-hub { background: rgba(16,185,129,0.2); color: #6EE7B7; border: 1px solid rgba(16,185,129,0.3); }
    .badge-active { background: rgba(16,185,129,0.15); color: #6EE7B7; border: 1px solid rgba(16,185,129,0.25); }
    .badge-post { background: rgba(124,58,237,0.15); color: #C4B5FD; }
    .badge-listing { background: rgba(245,158,11,0.15); color: #FCD34D; }

    /* BUTTONS */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
      border: none; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .btn-primary { background: var(--brand); color: white; }
    .btn-primary:hover { background: var(--brand-dark); }
    .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--border); color: var(--text); }
    .btn-danger { background: rgba(239,68,68,0.15); color: #FCA5A5; border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .btn-warn { background: rgba(245,158,11,0.15); color: #FCD34D; border: 1px solid rgba(245,158,11,0.3); }
    .btn-warn:hover { background: rgba(245,158,11,0.25); }
    .btn-success { background: rgba(16,185,129,0.15); color: #6EE7B7; border: 1px solid rgba(16,185,129,0.3); }
    .btn-success:hover { background: rgba(16,185,129,0.25); }
    .btn-blue { background: rgba(59,130,246,0.15); color: #93C5FD; border: 1px solid rgba(59,130,246,0.3); }
    .btn-blue:hover { background: rgba(59,130,246,0.25); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-lg { padding: 11px 22px; font-size: 14px; }
    .btn-full { width: 100%; justify-content: center; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ICON BUTTONS */
    .icon-btn {
      width: 30px; height: 30px; border-radius: 6px; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s; font-size: 15px;
    }
    .icon-btn:hover { background: var(--surface2); }
    .icon-btn.red:hover { background: rgba(239,68,68,0.15); }

    /* MODAL */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
      padding: 24px; backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; width: 100%; max-width: 560px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6);
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn { from { opacity:0; transform: scale(0.95) translateY(10px); } to { opacity:1; transform: none; } }
    .modal-header {
      padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 17px; font-weight: 700; }
    .modal-close {
      width: 32px; height: 32px; border-radius: 8px; border: none;
      background: var(--surface2); color: var(--text2); cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .modal-close:hover { background: var(--border); color: var(--text); }
    .modal-body { padding: 20px 24px 24px; }
    .modal-footer { padding: 0 24px 24px; display: flex; gap: 10px; justify-content: flex-end; }

    /* FORM */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 7px; }
    .form-input, .form-textarea, .form-select {
      width: 100%; padding: 11px 14px; background: var(--bg2);
      border: 1.5px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--brand); }
    .form-textarea { resize: none; min-height: 100px; }
    .form-select option { background: var(--surface); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-hint { font-size: 11px; color: var(--text3); margin-top: 5px; }

    /* TOAST */
    #toast-container {
      position: fixed; top: 20px; right: 20px; z-index: 9999;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      padding: 12px 16px; border-radius: 10px; font-size: 13.5px; font-weight: 500;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4); animation: toastIn 0.3s ease;
      max-width: 320px;
    }
    @keyframes toastIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: none; } }
    .toast-success { background: #065F46; color: #6EE7B7; border: 1px solid rgba(16,185,129,0.3); }
    .toast-error { background: #7F1D1D; color: #FCA5A5; border: 1px solid rgba(239,68,68,0.3); }
    .toast-info { background: var(--surface); color: var(--text2); border: 1px solid var(--border); }

    /* TABS */
    .page-tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; width: fit-content; }
    .page-tab {
      padding: 7px 16px; border-radius: 7px; font-size: 13px; font-weight: 600;
      color: var(--text2); cursor: pointer; border: none; background: none; transition: all 0.15s;
    }
    .page-tab.active { background: var(--brand); color: white; }

    /* EMPTY STATE */
    .empty { text-align: center; padding: 60px 24px; color: var(--text3); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
    .empty-sub { font-size: 13px; }

    /* LOADER */
    .loader { display: flex; align-items: center; justify-content: center; padding: 48px; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border2);
      border-top-color: var(--brand); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* DIVIDER */
    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    /* STATUS DOT */
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    .dot-green { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot-red { background: var(--red); }
    .dot-amber { background: var(--accent); }

    /* GRID UTILS */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    /* UNI BREAKDOWN */
    .uni-bar-wrap { margin-bottom: 12px; }
    .uni-bar-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
    .uni-bar-track { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
    .uni-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }

    /* HUB POST PREVIEW */
    .hub-post-preview {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px; margin-top: 12px;
      border-left: 3px solid var(--brand);
    }
    .hub-post-preview-label { font-size: 10px; font-weight: 700; color: var(--brand); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .hub-post-preview-text { font-size: 14px; color: var(--text); line-height: 1.5; }

    /* ACTIVITY LOG */
    .activity-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .activity-item:last-child { border-bottom: none; }
    .activity-dot-wrap { display: flex; flex-direction: column; align-items: center; padding-top: 3px; }
    .activity-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .activity-content { flex: 1; }
    .activity-text { font-size: 13px; color: var(--text2); line-height: 1.5; }
    .activity-time { font-size: 11px; color: var(--text3); margin-top: 2px; }

    /* POST CONTENT PREVIEW */
    .post-preview-text {
      font-size: 13px; color: var(--text2); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    /* RESPONSIVE */
    @media (max-width: 1100px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div id="root"></div>

<script>
// ========================================================
// CONFIG — Replace with your Supabase project values
// ========================================================
const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co'
const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY_HERE'

const ADMIN_EMAILS = [
  'opemuhammad35@gmail.com',
  'sumudinnovation4@gmail.com',
  'campusplug04@gmail.com',
]

// ========================================================
// SUPABASE CLIENT
// ========================================================
const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// ========================================================
// UTILS
// ========================================================
let toastTimer = {}
function toast(msg, type = 'info') {
  const el = document.createElement('div')
  el.className = `toast toast-${type}`
  el.textContent = msg
  document.getElementById('toast-container').appendChild(el)
  setTimeout(() => el.remove(), 3500)
}

function timeAgo(ts) {
  const s = Math.floor((Date.now() - new Date(ts)) / 1000)
  if (s < 60) return `${s}s ago`
  if (s < 3600) return `${Math.floor(s/60)}m ago`
  if (s < 86400) return `${Math.floor(s/3600)}h ago`
  return `${Math.floor(s/86400)}d ago`
}

function fmtDate(ts) {
  return new Date(ts).toLocaleDateString('en-NG', { day: 'numeric', month: 'short', year: 'numeric' })
}

function initials(name) {
  return (name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase()
}

function numFmt(n) {
  if (n >= 1000) return (n/1000).toFixed(1) + 'k'
  return String(n)
}

function confirmAction(msg) {
  return window.confirm(msg)
}

// ========================================================
// STATE
// ========================================================
let state = {
  user: null,
  profile: null,
  page: 'overview',
  loading: false,
  // data
  stats: { users: 0, posts: 0, listings: 0, orders: 0, reports: 0, verifications: 0 },
  users: [], usersTotal: 0,
  posts: [], postsTotal: 0,
  listings: [],
  orders: [],
  reports: [],
  hubPosts: [],
  growthData: [],
  uniBreakdown: [],
  // filters
  userSearch: '', userFilter: 'all',
  postSearch: '', postFilter: 'all',
  // modals
  modal: null,  // { type, data }
  // charts
  charts: {},
}

// ========================================================
// AUTH
// ========================================================
async function checkAuth() {
  const { data: { session } } = await db.auth.getSession()
  if (!session) { renderAuth(); return }
  state.user = session.user
  if (!ADMIN_EMAILS.includes(session.user.email)) {
    renderAuthError('This email is not authorised to access the admin dashboard.')
    return
  }
  const { data: profile } = await db.from('profiles').select('*, universities(name)').eq('id', session.user.id).single()
  state.profile = profile
  renderApp()
  loadAll()
}

async function login(email, password) {
  if (!ADMIN_EMAILS.includes(email.toLowerCase())) {
    return 'This email does not have admin access.'
  }
  const { data, error } = await db.auth.signInWithPassword({ email, password })
  if (error) return error.message
  state.user = data.user
  const { data: profile } = await db.from('profiles').select('*, universities(name)').eq('id', data.user.id).single()
  state.profile = profile
  renderApp()
  loadAll()
  return null
}

async function logout() {
  await db.auth.signOut()
  state.user = null; state.profile = null
  renderAuth()
}

// ========================================================
// DATA LOADING
// ========================================================
async function loadAll() {
  await Promise.all([loadStats(), loadGrowthData(), loadUniBreakdown()])
  if (state.page === 'users') loadUsers()
  else if (state.page === 'posts') loadPosts()
  else if (state.page === 'hub') loadHubPosts()
  else if (state.page === 'orders') loadOrders()
}

async function loadStats() {
  const [u, p, l, o] = await Promise.all([
    db.from('profiles').select('*', { count: 'exact', head: true }),
    db.from('posts').select('*', { count: 'exact', head: true }),
    db.from('listings').select('*', { count: 'exact', head: true }),
    db.from('orders').select('*', { count: 'exact', head: true }),
  ])
  const verified = await db.from('profiles').select('*', { count: 'exact', head: true }).eq('is_verified', true)
  const restricted = await db.from('profiles').select('*', { count: 'exact', head: true }).eq('is_restricted', true)
  state.stats = {
    users: u.count || 0, posts: p.count || 0,
    listings: l.count || 0, orders: o.count || 0,
    verified: verified.count || 0, restricted: restricted.count || 0,
  }
  renderStats()
}

async function loadGrowthData() {
  // Get users grouped by week for the last 12 weeks
  const since = new Date(Date.now() - 84 * 86400 * 1000).toISOString()
  const { data } = await db.from('profiles').select('created_at').gte('created_at', since).order('created_at')
  if (!data) return
  // Group by week
  const weeks = {}
  data.forEach(row => {
    const d = new Date(row.created_at)
    const week = new Date(d.setDate(d.getDate() - d.getDay())).toLocaleDateString('en-NG', { month: 'short', day: 'numeric' })
    weeks[week] = (weeks[week] || 0) + 1
  })
  state.growthData = Object.entries(weeks).map(([label, count]) => ({ label, count }))
  renderCharts()
}

async function loadUniBreakdown() {
  const { data } = await db.from('profiles').select('universities(name)').not('university_id', 'is', null)
  if (!data) return
  const counts = {}
  data.forEach(r => {
    const name = r.universities?.name || 'Unknown'
    counts[name] = (counts[name] || 0) + 1
  })
  const total = Object.values(counts).reduce((a, b) => a + b, 0)
  state.uniBreakdown = Object.entries(counts).map(([name, count]) => ({ name, count, pct: Math.round(count/total*100) })).sort((a,b) => b.count - a.count)
  renderUniBreakdown()
}

async function loadUsers() {
  let q = db.from('profiles')
    .select('*, universities(name)', { count: 'exact' })
    .order('created_at', { ascending: false })
    .limit(100)
  if (state.userSearch) q = q.or(`username.ilike.%${state.userSearch}%,full_name.ilike.%${state.userSearch}%`)
  if (state.userFilter === 'admin') q = q.eq('is_admin', true)
  if (state.userFilter === 'verified') q = q.eq('is_verified', true)
  if (state.userFilter === 'restricted') q = q.eq('is_restricted', true)
  if (state.userFilter === 'banned') q = q.eq('is_banned', true)
  const { data, count } = await q
  state.users = data || []
  state.usersTotal = count || 0
  renderUsers()
}

async function loadPosts() {
  let q = db.from('posts')
    .select('*, profiles(username, full_name, is_verified), universities(name)', { count: 'exact' })
    .order('created_at', { ascending: false })
    .limit(100)
  if (state.postFilter === 'hub') q = q.eq('is_hub_service', true)
  if (state.postFilter === 'flagged') q = q.eq('is_flagged', true)
  if (state.postSearch) q = q.ilike('content', `%${state.postSearch}%`)
  const { data, count } = await q
  state.posts = data || []
  state.postsTotal = count || 0
  renderPosts()
}

async function loadHubPosts() {
  const { data } = await db.from('posts')
    .select('*, profiles(username, full_name, avatar_url), hub_polls(id, question, options, ends_at)')
    .eq('is_hub_service', true)
    .order('created_at', { ascending: false })
    .limit(50)
  state.hubPosts = data || []
  renderHubPosts()
}

async function loadOrders() {
  const { data } = await db.from('orders')
    .select('*, listings(title), buyer:buyer_id(username), seller:seller_id(username)')
    .order('created_at', { ascending: false })
    .limit(100)
  state.orders = data || []
  renderOrders()
}

// ========================================================
// ACTIONS
// ========================================================
async function deletePost(postId) {
  if (!confirmAction('Permanently delete this post? This cannot be undone.')) return
  const { error } = await db.from('posts').delete().eq('id', postId)
  if (error) { toast('Failed: ' + error.message, 'error'); return }
  toast('Post deleted', 'success')
  loadPosts(); loadStats()
}

async function toggleVerified(userId, current) {
  const { error } = await db.from('profiles').update({ is_verified: !current }).eq('id', userId)
  if (error) { toast('Failed: ' + error.message, 'error'); return }
  toast(current ? 'Verification removed' : '✓ User verified', 'success')
  loadUsers(); loadStats()
}

async function toggleRestricted(userId, current) {
  const { error } = await db.from('profiles').update({ is_restricted: !current }).eq('id', userId)
  if (error) { toast('Failed', 'error'); return }
  toast(current ? 'Restriction lifted' : '⚠️ Account restricted', 'success')
  loadUsers(); loadStats()
}

async function toggleBanned(userId, current) {
  if (!current && !confirmAction('Ban this user? They will not be able to log in.')) return
  const { error } = await db.from('profiles').update({ is_banned: !current }).eq('id', userId)
  if (error) { toast('Failed', 'error'); return }
  toast(current ? 'User unbanned' : '🚫 User banned', current ? 'info' : 'error')
  loadUsers(); loadStats()
}

async function toggleAdmin(userId, current) {
  const { error } = await db.from('profiles').update({ is_admin: !current }).eq('id', userId)
  if (error) { toast('Failed', 'error'); return }
  toast(current ? 'Admin revoked' : '👑 Admin granted', 'success')
  loadUsers()
}

async function deleteUser(userId) {
  if (!confirmAction('Delete this account permanently? All posts and data will be removed.')) return
  const { error } = await db.from('profiles').delete().eq('id', userId)
  if (error) { toast('Failed: ' + error.message, 'error'); return }
  toast('Account deleted', 'success')
  loadUsers(); loadStats()
}

async function publishHubPost(content, pollMode, pollOptions, endsIn, mediaNote) {
  if (!content.trim()) { toast('Write some content first', 'error'); return false }
  const { data: postData, error } = await db.from('posts').insert({
    author_id: state.user.id,
    content,
    is_hub_service: true,
    post_type: pollMode ? 'poll' : 'text',
    university_id: null,
  }).select().single()
  if (error) { toast('Failed: ' + error.message, 'error'); return false }

  if (pollMode && postData) {
    const options = pollOptions.filter(o => o.trim()).map((label, i) => ({ id: String(i), label }))
    const endsAt = new Date(Date.now() + endsIn * 3600 * 1000).toISOString()
    await db.from('hub_polls').insert({ post_id: postData.id, question: content, options, ends_at: endsAt })
  }
  toast('📢 Hub post published to all campuses!', 'success')
  closeModal()
  loadHubPosts()
  return true
}

async function deleteHubPost(postId) {
  if (!confirmAction('Delete this hub post from all university timelines?')) return
  await db.from('hub_polls').delete().eq('post_id', postId)
  await db.from('posts').delete().eq('id', postId)
  toast('Hub post deleted', 'success')
  loadHubPosts()
}

async function updateOrderStatus(orderId, status) {
  await db.from('orders').update({ status }).eq('id', orderId)
  toast('Order updated', 'success')
  loadOrders()
}

let pollOptCount = 2
function addPollOption() {
  const container = document.getElementById('poll-options')
  if (!container || pollOptCount >= 6) return
  const input = document.createElement('input')
  input.className = 'form-input'
  input.style.marginBottom = '8px'
  input.placeholder = `Option ${pollOptCount + 1}`
  input.id = `poll-opt-${pollOptCount}`
  container.appendChild(input)
  pollOptCount++
}

async function submitHubPost() {
  const content = document.getElementById('hub-content')?.value || ''
  const pollMode = document.getElementById('hub-poll-toggle')?.checked || false
  const endsIn = parseInt(document.getElementById('hub-ends-in')?.value || '48')
  const opts = []
  for (let i = 0; i < pollOptCount; i++) {
    const v = document.getElementById(`poll-opt-${i}`)?.value || ''
    if (v.trim()) opts.push(v.trim())
  }
  pollOptCount = 2
  await publishHubPost(content, pollMode, opts, endsIn, '')
}

      <div style="font-size:48px;margin-bottom:16px">🚫</div>

async function doLogin() {
  const email = document.getElementById('auth-email').value.trim()
  const pass = document.getElementById('auth-pass').value
  const btn = document.getElementById('auth-btn')
  const errEl = document.getElementById('auth-err')
  errEl.innerHTML = ''
  btn.disabled = true; btn.textContent = 'Signing in...'
  const err = await login(email, pass)
  if (err) {
    errEl.innerHTML = `<div class="auth-err">${err}</div>`
    btn.disabled = false; btn.textContent = 'Sign In to Dashboard'
  }
}

  return `<button class="nav-item ${state.page===id?'active':''}" id="nav-${id}" onclick="navigateTo('${id}')">${icon} ${label}</button>`
}

function navigateTo(page) {
  state.page = page
  // Update active nav
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'))
  const nav = document.getElementById(`nav-${page}`)
  if (nav) nav.classList.add('active')

  const titles = {
    overview: ['Overview', 'Platform health at a glance'],
    users: ['Users', 'Manage student accounts'],
    posts: ['Posts & Content', 'Moderate and review posts'],
    hub: ['Hub Services', 'Post announcements to all campuses'],
    listings: ['Marketplace', 'Products and services listed'],
    orders: ['Orders', 'Track and manage orders'],
    universities: ['Universities', 'Manage campuses'],
  }
  const [title, sub] = titles[page] || [page, '']
  document.getElementById('topbar-title').textContent = title
  document.getElementById('topbar-sub').textContent = sub

  const pc = document.getElementById('page-content')
  pc.innerHTML = '<div class="loader"><div class="spinner"></div></div>'

  if (page === 'overview') renderOverview()
  else if (page === 'users') { loadUsers(); }
  else if (page === 'posts') { loadPosts(); }
  else if (page === 'hub') { loadHubPosts(); }
  else if (page === 'listings') { loadListings(); }
  else if (page === 'orders') { loadOrders(); }
  else if (page === 'universities') { loadUniversities(); }
}

function renderCharts() {
  if (!state.growthData.length) return
  // Destroy old
  if (state.charts.growth) { state.charts.growth.destroy() }
  if (state.charts.uniPie) { state.charts.uniPie.destroy() }

  const gCtx = document.getElementById('growth-chart')
  if (gCtx) {
    state.charts.growth = new Chart(gCtx, {
      type: 'line',
      data: {
        labels: state.growthData.map(d => d.label),
        datasets: [{
          label: 'New Users',
          data: state.growthData.map(d => d.count),
          borderColor: '#7C3AED',
          backgroundColor: 'rgba(124,58,237,0.1)',
          borderWidth: 2.5,
          pointBackgroundColor: '#7C3AED',
          pointRadius: 4,
          fill: true,
          tension: 0.4,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6B6894', font: { size: 11 } } },
          y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6B6894', font: { size: 11 }, precision: 0 } }
        }
      }
    })
  }

  const pCtx = document.getElementById('uni-pie-chart')
  if (pCtx && state.uniBreakdown.length) {
    const colors = ['#7C3AED', '#10B981', '#F59E0B', '#3B82F6', '#F97316', '#EF4444']
    state.charts.uniPie = new Chart(pCtx, {
      type: 'doughnut',
      data: {
        labels: state.uniBreakdown.map(u => u.name),
        datasets: [{
          data: state.uniBreakdown.map(u => u.count),
          backgroundColor: colors,
          borderWidth: 2, borderColor: '#1E1B2E'
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom', labels: { color: '#A8A3C8', font: { size: 11 }, boxWidth: 12 } }
        },
        cutout: '65%'
      }
    })
  }
}

function renderUniBreakdown() {

  if (!pc) return
  pc.innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
      <button class="btn btn-primary" onclick="openAddUniModal()">+ Add University</button>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Universities</span><span class="card-count">${data?.length||0}</span></div>
      <table>
        <thead><tr><th>Name</th><th>Slug</th><th>Created</th><th>Actions</th></tr></thead>
        <tbody>
          ${(data||[]).map(u => `<tr>
            <td style="font-weight:600">${u.name}</td>
            <td><span class="badge badge-post">${u.slug}</span></td>
            <td style="font-size:12px;color:var(--text3)">${fmtDate(u.created_at)}</td>
            <td><button class="btn btn-danger btn-sm" onclick="deleteUni('${u.id}','${u.name}')">Remove</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`
}

function openAddUniModal() {
  let el = document.getElementById('modal-root')
  if (!el) { el = document.createElement('div'); el.id = 'modal-root'; document.body.appendChild(el) }
  el.innerHTML = `
  <div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal" style="max-width:400px">
      <div class="modal-header"><span class="modal-title">Add University</span><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">University Name</label><input class="form-input" id="uni-name" placeholder="e.g. University of Ibadan"></div>
        <div class="form-group"><label class="form-label">Slug (short code)</label><input class="form-input" id="uni-slug" placeholder="e.g. ui"><div class="form-hint">Lowercase, no spaces</div></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="addUni()">Add University</button>
      </div>
    </div>
  </div>`
}

async function addUni() {
  const name = document.getElementById('uni-name')?.value.trim()
  const slug = document.getElementById('uni-slug')?.value.trim().toLowerCase()
  if (!name || !slug) { toast('Fill in all fields', 'error'); return }
  const { error } = await db.from('universities').insert({ name, slug })
  if (error) { toast('Failed: ' + error.message, 'error'); return }
  toast('University added!', 'success')
  closeModal(); loadUniversities()
}

async function deleteUni(id, name) {
  if (!confirmAction(`Remove ${name}? Students of this university will lose their feed access.`)) return
  await db.from('universities').delete().eq('id', id)
  toast('University removed', 'success')
  loadUniversities()
}

// ========================================================
// DEBOUNCE
// ========================================================
let debounceTimers = {}
function debounceLoad(type) {
  clearTimeout(debounceTimers[type])
  debounceTimers[type] = setTimeout(() => {
    if (type === 'users') loadUsers()
    if (type === 'posts') loadPosts()
  }, 350)
}

// ========================================================
// INIT
// ========================================================
checkAuth()
</script>
</body>
</html>
